name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: conventional-changelog-conventionalcommits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update formula sha256
        if: steps.semantic.outputs.new_release_published == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.semantic.outputs.new_release_version }}
          URL="https://github.com/rit3zh/apple-music-discord-rpc/archive/refs/tags/v${VERSION}.tar.gz"
          SHA=$(curl -sL "$URL" | shasum -a 256 | awk '{print $1}')

          sed -i "s|url \".*\"|url \"${URL}\"|" Formula/apple-music-discord-rpc.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA}\"|" Formula/apple-music-discord-rpc.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/apple-music-discord-rpc.rb
          git commit -m "chore(formula): update sha256 for v${VERSION} [skip ci]"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/rit3zh/apple-music-discord-rpc.git main
